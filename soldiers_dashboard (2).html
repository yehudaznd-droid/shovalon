<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>דוח נוכחות חיילים</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;direction:rtl;background:#C8E6FF;min-height:100vh;}
.wrap{padding:1rem;max-width:960px;margin:0 auto;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.title{font-size:20px;font-weight:800;color:#0B3D72;}
.meta{font-size:11px;color:#2B76B5;margin-top:2px;}
.topbar-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.btn{display:flex;align-items:center;gap:5px;padding:7px 14px;font-size:12px;border-radius:20px;border:1.5px solid;cursor:pointer;font-weight:600;font-family:'Heebo';transition:all .15s;}
.btn-blue{border-color:#7DB8E8;background:#fff;color:#185FA5;}.btn-blue:hover{background:#E0F0FF;}
.btn-green{border-color:#1E7A34;background:#E8F5EC;color:#1E7A34;}.btn-green:hover{background:#C6E8D0;}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#0B3D72;background:rgba(255,255,255,0.6);padding:3px 8px;border-radius:20px;border:1px solid rgba(125,184,232,0.5);}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.tab{padding:6px 14px;border-radius:20px;border:1.5px solid #7DB8E8;font-size:12px;cursor:pointer;background:rgba(255,255,255,0.8);color:#185FA5;transition:all .15s;font-family:'Heebo';font-weight:600;white-space:nowrap;}
.tab:hover{background:#fff;}
.tab.active{background:#185FA5;color:#fff;border-color:#185FA5;}
.tab-anomaly{border-color:#E8000A;color:#A00;background:#FFF0F0;}
.tab-anomaly.active{background:#E8000A;color:#fff;border-color:#E8000A;}
.tab-log{border-color:#7A3F00;color:#7A3F00;background:#FFF8EE;}
.tab-log.active{background:#FF7200;color:#fff;border-color:#FF7200;}
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
.scard{background:rgba(255,255,255,0.9);border-radius:12px;padding:10px 12px;border:1.5px solid rgba(125,184,232,0.6);}
.scard-label{font-size:10px;color:#2B76B5;margin-bottom:3px;font-weight:500;}
.scard-val{font-size:24px;font-weight:800;color:#0B3D72;line-height:1;}
.table-wrap{overflow-x:auto;border-radius:12px;border:1.5px solid rgba(125,184,232,0.7);background:rgba(255,255,255,0.95);box-shadow:0 2px 16px rgba(12,61,114,0.08);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:#B8D9F5;}
th{padding:10px 10px;font-weight:700;font-size:11px;color:#0B3D72;border-bottom:1.5px solid #7DB8E8;white-space:nowrap;text-align:center;}
th.col-name{text-align:right;min-width:160px;}
th.col-unit{text-align:right;min-width:80px;}
tbody tr{transition:background .1s;}
tbody tr:hover{background:#EBF5FF;}
td{padding:9px 10px;border-bottom:1px solid #E0EFFF;vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
td.col-stat{text-align:center;}
td.col-name{text-align:right;}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700;min-width:32px;text-align:center;font-family:'Heebo';}
.b-green{background:#C6E8A0;color:#1E5208;}
.b-yellow{background:#FFE0A0;color:#7A3F00;}
.b-gray{background:#DEDED8;color:#3A3A36;}
.b-blue{background:#BEE0FF;color:#0A3D7A;cursor:pointer;transition:background .12s;}
.b-blue:hover{background:#8AC8FF;}
.name-cell-inner{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.name-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:10px;font-weight:700;font-size:12px;white-space:nowrap;}
.name-normal{color:#1a1a1a;background:transparent;cursor:default;}
.name-star{color:#1a1a1a;background:transparent;cursor:default;}
.name-red{background:#E8000A;color:#fff;box-shadow:0 2px 8px rgba(230,0,10,0.35);cursor:pointer;}
.name-red:hover{background:#C0000A;}
.name-orange{background:#FF7200;color:#fff;box-shadow:0 2px 6px rgba(255,114,0,0.3);cursor:pointer;}
.name-orange:hover{background:#D45F00;}
.name-both{background:linear-gradient(90deg,#E8000A 50%,#FF7200 50%);color:#fff;box-shadow:0 2px 8px rgba(200,50,0,0.3);cursor:pointer;}
.name-both:hover{opacity:.87;}
.name-teal{background:#00A89D;color:#fff;box-shadow:0 2px 8px rgba(0,168,157,0.35);cursor:pointer;}
.name-teal:hover{background:#008A80;}
.name-teal-orange{background:linear-gradient(90deg,#00A89D 50%,#FF7200 50%);color:#fff;cursor:pointer;}
.name-teal-orange:hover{opacity:.87;}
.name-teal-red{background:linear-gradient(90deg,#00A89D 50%,#E8000A 50%);color:#fff;cursor:pointer;}
.name-teal-red:hover{opacity:.87;}
.name-all-three{background:linear-gradient(90deg,#00A89D 33%,#E8000A 33%,#E8000A 66%,#FF7200 66%);color:#fff;cursor:pointer;}
.handle-btn{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid #185FA5;background:#E6F1FF;color:#185FA5;font-family:'Heebo';transition:all .12s;white-space:nowrap;}
.handle-btn:hover{background:#185FA5;color:#fff;}
.star-indicator{font-size:13px;color:#BA7517;font-weight:700;}
.status-bar{display:flex;align-items:center;gap:7px;margin-top:1rem;font-size:11px;color:#2B76B5;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.loading-box{text-align:center;padding:3rem 1rem;color:#2B76B5;font-size:14px;}
.err-box{padding:1rem;background:#FFE4E4;color:#A00;border-radius:10px;font-size:13px;font-weight:500;}

/* log table */
.log-wrap{overflow-x:auto;border-radius:12px;border:1.5px solid rgba(125,184,232,0.7);background:rgba(255,255,255,0.95);}
.log-table{width:100%;border-collapse:collapse;font-size:13px;}
.log-table thead tr{background:#B8D9F5;}
.log-table th{padding:10px;font-weight:700;font-size:11px;color:#0B3D72;border-bottom:1.5px solid #7DB8E8;text-align:right;}
.log-table td{padding:9px 10px;border-bottom:1px solid #E0EFFF;font-size:12px;vertical-align:top;}
.log-table tbody tr:last-child td{border-bottom:none;}
.log-table tbody tr:hover{background:#EBF5FF;}
.log-flag-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;color:#fff;}
.log-empty{text-align:center;padding:3rem;color:#2B76B5;font-size:14px;}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(8,30,60,0.4);display:flex;align-items:center;justify-content:center;z-index:999;padding:1rem;}
.modal{background:#fff;border-radius:16px;border:1.5px solid #90C3E8;padding:1.25rem;max-width:400px;width:100%;max-height:82vh;overflow-y:auto;direction:rtl;box-shadow:0 12px 40px rgba(8,50,120,0.22);}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1.5px solid #D6ECFF;gap:10px;}
.modal-title{font-size:14px;font-weight:700;color:#0B3D72;line-height:1.4;}
.modal-close{width:28px;height:28px;min-width:28px;border-radius:50%;background:#E8000A;color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;font-family:'Heebo';flex-shrink:0;}
.modal-close:hover{background:#B00;}
.modal-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #EBF5FF;font-size:13px;color:#1a1a1a;}
.modal-row:last-child{border-bottom:none;}
.modal-val{font-weight:700;}
.modal-section-title{font-size:11px;color:#2B76B5;margin:10px 0 5px;font-weight:600;text-transform:uppercase;}
.back-btn{display:flex;align-items:center;gap:4px;background:none;border:none;color:#185FA5;font-family:'Heebo';font-size:12px;font-weight:600;cursor:pointer;padding:0;margin-bottom:12px;}
.back-btn:hover{text-decoration:underline;}
.flag-list{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.flag-pick-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:2px solid;cursor:pointer;font-family:'Heebo';font-size:13px;font-weight:700;transition:all .12s;background:#fff;width:100%;text-align:right;}
.flag-pick-btn:hover{opacity:.85;}
.flag-dot{width:14px;height:14px;border-radius:4px;flex-shrink:0;}
.flag-already{font-size:10px;font-weight:500;color:#1E7A34;margin-right:auto;}
.action-list{display:flex;gap:10px;margin-top:8px;}
.action-btn{flex:1;padding:12px;border-radius:12px;border:2px solid;cursor:pointer;font-family:'Heebo';font-size:13px;font-weight:700;text-align:center;transition:all .12s;background:#fff;}
.action-approve{border-color:#1E7A34;color:#1E7A34;}.action-approve:hover{background:#E8F5EC;}
.action-fix{border-color:#185FA5;color:#185FA5;}.action-fix:hover{background:#E6F1FF;}
.form-group{margin-bottom:10px;}
.form-label{font-size:11px;font-weight:700;color:#2B76B5;margin-bottom:4px;display:block;}
.req{color:#E8000A;}
.form-select,.form-input{width:100%;padding:8px 10px;border-radius:8px;border:1.5px solid #90C3E8;font-family:'Heebo';font-size:13px;color:#1a1a1a;background:#F5FAFF;outline:none;}
.form-select:focus,.form-input:focus{border-color:#185FA5;}
.form-select.error{border-color:#E8000A;background:#FFF5F5;}
.form-err{font-size:10px;color:#E8000A;margin-top:3px;display:none;}
.form-err.show{display:block;}
.submit-btn{width:100%;padding:9px;border-radius:10px;color:#fff;border:none;font-family:'Heebo';font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;}
.submit-green{background:#1E7A34;}.submit-green:hover{background:#155A26;}
.submit-blue{background:#185FA5;}.submit-blue:hover{background:#0B3D72;}
.submit-red{background:#E8000A;}.submit-red:hover{background:#B00;}
.date-list{max-height:180px;overflow-y:auto;border:1.5px solid #90C3E8;border-radius:8px;padding:6px;margin-bottom:8px;background:#F5FAFF;}
.date-item{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:6px;cursor:pointer;font-size:13px;}
.date-item:hover{background:#E6F1FF;}
.date-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#185FA5;}
.select-all-row{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:#185FA5;margin-bottom:6px;cursor:pointer;}
.select-all-row input{width:15px;height:15px;accent-color:#185FA5;}
.existing-approval{background:#F0F9FF;border-radius:8px;padding:8px 10px;margin-bottom:12px;font-size:12px;}
.ea-title{font-size:10px;font-weight:700;color:#2B76B5;margin-bottom:4px;}
.ea-who{font-weight:700;color:#0B3D72;}
.ea-when{font-size:10px;color:#2B76B5;}
.ea-why{font-size:11px;color:#555;margin-top:2px;}

@media(max-width:600px){
  .wrap{padding:.75rem;}
  .title{font-size:17px;}
  .summary-row{grid-template-columns:repeat(2,1fr);}
  th,td{padding:7px 7px;font-size:11px;}
  .badge{padding:2px 7px;font-size:11px;min-width:26px;}
  .name-chip{font-size:11px;padding:3px 8px;}
  th.col-name{min-width:130px;}
  .scard-val{font-size:20px;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <div class="title">🪖 דוח נוכחות חיילים</div>
      <div class="meta" id="meta">טוען...</div>
    </div>
    <div class="topbar-btns">
      <button class="btn btn-green" onclick="exportExcel()">📊 ייצוא יומן</button>
      <button class="btn btn-blue" onclick="loadAll()">↻ רענן</button>
    </div>
  </div>

  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#1E5208"></div>בסיס</div>
    <div class="leg"><div class="leg-dot" style="background:#FF7200"></div>בית &gt; בסיס</div>
    <div class="leg"><div class="leg-dot" style="background:#E8000A"></div>רצף בית &gt; בסיס</div>
    <div class="leg"><div class="leg-dot" style="background:#00A89D"></div>רצף בית ≥ 7 ימים</div>
    <div class="leg"><div class="leg-dot" style="background:#0A3D7A"></div>אחר</div>
    <div class="leg"><span style="font-size:13px;color:#BA7517">★</span> טופל בעבר</div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="summary-row" id="summary" style="display:none">
    <div class="scard"><div class="scard-label">חיילים</div><div class="scard-val" id="s-soldiers">—</div></div>
    <div class="scard"><div class="scard-label" style="color:#1E5208">ימי בסיס</div><div class="scard-val" id="s-base">—</div></div>
    <div class="scard"><div class="scard-label" style="color:#7A3F00">ימי בית</div><div class="scard-val" id="s-home">—</div></div>
    <div class="scard"><div class="scard-label" style="color:#A00">חיילים בסיכון</div><div class="scard-val" id="s-red">—</div></div>
  </div>

  <div id="content"><div class="loading-box">⏳ טוען נתונים...</div></div>

  <div class="status-bar">
    <span class="dot" id="sdot" style="background:#888"></span>
    <span id="stext">מתחבר...</span>
  </div>
</div>

<div id="modal" style="display:none"></div>

<script>
const SOURCE_ID='1DKT0LHgrqXFWake6giDnA-L5NCpxNLP4JzRvcrQK3nk';
const API_KEY='AIzaSyDgbReCQiOVqy6HvqRd_2hFqzvxLmomzXY';
const HEADER_ROWS=2, START_COL=25, TEAL_THRESHOLD=7;
const APPROVERS=['מעודה','סבירו'];
const LS_KEY='soldiers_v4';

const FLAG_META={
  teal:{label:'רצף בית ≥ 7 ימים',color:'#00A89D',border:'#007A72'},
  red:{label:'רצף בית > רצף בסיס',color:'#E8000A',border:'#A00'},
  orange:{label:'סה"כ בית > סה"כ בסיס',color:'#FF7200',border:'#B35000'},
};

// ===== STATE =====
let sheets=[], activeIdx=0, currentView='sheet'; // 'sheet' | 'anomaly' | 'log'
// storage: { handled: [ {name,unit,flag,streakKey,action,approver,reason,date} ], ... }
let storage={handled:[]};

function loadStorage(){ try{ storage=JSON.parse(localStorage.getItem(LS_KEY)||'{"handled":[]}'); if(!storage.handled)storage.handled=[]; }catch(e){storage={handled:[]};} }
function saveStorage(){ localStorage.setItem(LS_KEY,JSON.stringify(storage)); }

// streakKey = comma-joined sorted dates of the streak, uniquely identifies a specific anomaly event
function makeStreakKey(dates){ return (dates||[]).filter(Boolean).sort().join(','); }

function getHandled(unit,name,flag,streakKey){
  return storage.handled.find(h=>h.unit===unit&&h.name===name&&h.flag===flag&&h.streakKey===streakKey)||null;
}
function addHandled(entry){ storage.handled.push(entry); saveStorage(); }
function removeHandled(unit,name,flag,streakKey){ storage.handled=storage.handled.filter(h=>!(h.unit===unit&&h.name===name&&h.flag===flag&&h.streakKey===streakKey)); saveStorage(); }
function hasAnyHandled(name){ return storage.handled.some(h=>h.name===name); }

// ===== DATA =====
function classify(v){ if(!v||!v.trim())return null; const s=v.trim(); if(s==='1'||s==='יציאה')return'base'; if(s==='בית')return'home'; if(s==='0')return'closed'; return'other'; }

function maxStreakInfo(arr,headers,type){
  let maxLen=0,maxStart=-1,cur=0,curStart=0;
  for(let i=0;i<arr.length;i++){ if(arr[i]===type){if(cur===0)curStart=i;cur++;if(cur>maxLen){maxLen=cur;maxStart=curStart;}}else cur=0; }
  if(maxStart<0)return{len:0,start:-1,dates:[],indices:[]};
  return{len:maxLen,start:maxStart,dates:headers.slice(maxStart,maxStart+maxLen),indices:Array.from({length:maxLen},(_,i)=>maxStart+i)};
}
function getBaseStreakBefore(arr,homeStart){ let max=0,cur=0; for(let i=0;i<homeStart;i++){if(arr[i]==='base'){cur++;if(cur>max)max=cur;}else cur=0;} return max; }

function calcHitargenut(shimpa){
  if(shimpa>=57)return 9;
  if(shimpa>=43)return 7;
  if(shimpa>=29)return 5;
  if(shimpa>=15)return 3;
  if(shimpa>=10)return 2;
  return 0;
}

function processRows(rows){
  if(!rows||rows.length<=HEADER_ROWS)return{soldiers:[],headers:[]};
  const headerRow=rows[1]||[];
  const raw=headerRow.slice(START_COL);
  const lastIdx=raw.length-1;
  const dropLast=lastIdx>=0&&raw[lastIdx]&&raw[lastIdx].toString().toUpperCase().includes('TOTAL');
  const endCol=dropLast?raw.length-1:raw.length;
  const headers=raw.slice(0,endCol);
  const soldiers=rows.slice(HEADER_ROWS).map((row,ri)=>{
    const lastName=(row[2]||'').trim(),firstName=(row[3]||'').trim();
    const name=[firstName,lastName].filter(Boolean).join(' ')||(row[0]||'').trim()||'';
    if(!name)return null;
    const cells=row.slice(START_COL,START_COL+endCol);
    const cl=cells.map(classify);
    const base=cl.filter(c=>c==='base').length,home=cl.filter(c=>c==='home').length;
    const closed=cl.filter(c=>c==='closed').length,other=cl.filter(c=>c==='other').length;
    const otherDetails={};
    cells.forEach(v=>{ if(classify(v)==='other'&&v&&v.trim()){const k=v.trim();otherDetails[k]=(otherDetails[k]||0)+1;} });
    const homeInfo=maxStreakInfo(cl,headers,'home');
    const baseBefore=homeInfo.start>=0?getBaseStreakBefore(cl,homeInfo.start):0;
    const isTeal=homeInfo.len>=TEAL_THRESHOLD;
    const isRed=homeInfo.len>baseBefore&&homeInfo.len>0;
    const isOrange=home>base;
    const shimpa=base+home;
    const hitargenut=calcHitargenut(shimpa);
    return{name,base,home,closed,other,otherDetails,homeStreak:homeInfo,baseBefore,isTeal,isRed,isOrange,cells,headers,sheetRowIdx:ri+HEADER_ROWS,shimpa,hitargenut};
  }).filter(Boolean);
  return{soldiers,headers};
}

// ===== ANOMALY LOGIC =====
// For a soldier+unit, get flags that are CURRENTLY active and NOT yet handled (for this streak)
function isApprovalStillValid(handled){
  if(!handled) return false;
  if(!handled.approvalUntil) return true; // no expiry = always valid
  // approvalUntil is stored as ISO date string YYYY-MM-DD
  const until=new Date(handled.approvalUntil);
  until.setHours(23,59,59,999);
  return new Date()<=until;
}

function getActivePendingFlags(s, unit){
  const flags=[];
  if(s.isTeal){
    const key=makeStreakKey(s.homeStreak.dates);
    const h=getHandled(unit,s.name,'teal',key);
    if(!h||!isApprovalStillValid(h))flags.push('teal');
  }
  if(s.isRed){
    const key=makeStreakKey(s.homeStreak.dates);
    const h=getHandled(unit,s.name,'red',key);
    if(!h||!isApprovalStillValid(h))flags.push('red');
  }
  if(s.isOrange){
    const homeDates=s.headers.filter((_,i)=>classify(s.cells[i])==='home');
    const key=makeStreakKey(homeDates);
    const h=getHandled(unit,s.name,'orange',key);
    if(!h||!isApprovalStillValid(h))flags.push('orange');
  }
  return flags;
}

function getStreakKey(s,flag){
  if(flag==='teal'||flag==='red')return makeStreakKey(s.homeStreak.dates);
  if(flag==='orange')return makeStreakKey(s.headers.filter((_,i)=>classify(s.cells[i])==='home'));
  return '';
}

// ===== MODAL =====
function openModal(html){ document.getElementById('modal').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`; document.getElementById('modal').style.display='block'; }
function closeModal(){ document.getElementById('modal').style.display='none'; }

function showStreakModal(i){
  const s=window.soldiers[i];
  const label=s.isTeal?`רצף בית ≥ ${TEAL_THRESHOLD} ימים`:'רצף בית > רצף בסיס';
  const dateList=s.homeStreak.dates.filter(Boolean).map(d=>`<div class="modal-row"><span>${d}</span><span class="modal-val" style="color:#A00">בית</span></div>`).join('');
  openModal(`<div class="modal-header"><span class="modal-title">${label}<br><span style="font-size:12px;color:#2B76B5">${s.name}</span></span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-row"><span>רצף בית</span><span class="modal-val" style="color:#E8000A">${s.homeStreak.len} ימים</span></div>
    <div class="modal-row"><span>רצף בסיס לפני</span><span class="modal-val" style="color:#1E5208">${s.baseBefore} ימים</span></div>
    <div class="modal-section-title">תאריכים:</div>${dateList||'<div class="modal-row"><span>אין תאריכים</span></div>'}`);
}
function showOtherModal(i){
  const s=window.soldiers[i];
  const rows=Object.entries(s.otherDetails).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="modal-row"><span>${k}</span><span class="modal-val"><span class="badge b-blue">${v} ימים</span></span></div>`).join('');
  openModal(`<div class="modal-header"><span class="modal-title">פירוט "אחר"<br><span style="font-size:12px;color:#2B76B5">${s.name}</span></span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-row"><span>סה"כ</span><span class="modal-val">${s.other}</span></div>${rows||'<div class="modal-row"><span>אין נתונים</span></div>'}`);
}

// ===== HANDLE FLOW =====
let _ctx={};

function getUnitForSoldier(i){
  if(currentView==='anomaly'||currentView==='log') return window.soldiers[i]._unit||'';
  return sheets[activeIdx]?.name||'';
}

function showHandlePicker(i){
  const s=window.soldiers[i]; const unit=getUnitForSoldier(i);
  const pending=getActivePendingFlags(s,unit);
  if(!pending.length){ closeModal(); return; }
  const flagBtns=pending.map(f=>{
    const m=FLAG_META[f];
    return `<button class="flag-pick-btn" style="border-color:${m.border};color:${m.border}" onclick="showActionPicker(${i},'${f}')"><span class="flag-dot" style="background:${m.color}"></span>${m.label}</button>`;
  }).join('');
  openModal(`<div class="modal-header"><span class="modal-title">טפל בחריגה<br><span style="font-size:12px;color:#2B76B5">${s.name}</span></span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <p style="font-size:12px;color:#555;margin-bottom:10px">בחר חריגה:</p><div class="flag-list">${flagBtns}</div>`);
}

function showActionPicker(i,flag){
  const s=window.soldiers[i]; const m=FLAG_META[flag];
  _ctx={i,flag,unit:getUnitForSoldier(i)};
  openModal(`<div class="modal-header"><span class="modal-title" style="color:${m.border}">● ${m.label}<br><span style="font-size:12px;color:#2B76B5">${s.name}</span></span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <button class="back-btn" onclick="showHandlePicker(${i})">← חזור</button>
    <p style="font-size:12px;color:#555;margin-bottom:8px">מה לעשות עם החריגה?</p>
    <div class="action-list">
      <button class="action-btn action-approve" onclick="showHandleForm(${i},'${flag}','approve')">✔ אשר<br><span style="font-size:10px;font-weight:400">החריגה מאושרת</span></button>
      <button class="action-btn action-fix" onclick="showHandleForm(${i},'${flag}','fix')">✏ תקן<br><span style="font-size:10px;font-weight:400">תיקון הימים</span></button>
    </div>`);
}

function isStreakOngoing(s,flag){
  // Check if the anomaly is still ongoing (last date in streak is today or later)
  let lastDate=null;
  if(flag==='teal'||flag==='red'){
    const dates=s.homeStreak.dates.filter(Boolean);
    if(dates.length) lastDate=dates[dates.length-1];
  } else if(flag==='orange'){
    const homeDates=s.headers.filter((_,idx)=>classify(s.cells[idx])==='home').filter(Boolean);
    if(homeDates.length) lastDate=homeDates[homeDates.length-1];
  }
  if(!lastDate) return false;
  // Try to parse date - headers may be in various formats
  // Try DD/MM/YYYY or YYYY-MM-DD
  let d=null;
  if(/^\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{4}$/.test(lastDate)){
    const parts=lastDate.split(/[\/\-\.]/);
    d=new Date(parts[2],parts[1]-1,parts[0]);
  } else {
    d=new Date(lastDate);
  }
  if(isNaN(d)) return false;
  const today=new Date(); today.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return d>=today;
}

function showHandleForm(i,flag,action){
  const s=window.soldiers[i]; const m=FLAG_META[flag];
  const actionLabel=action==='approve'?'אישור חריגה':'תיקון חריגה';
  const actionColor=action==='approve'?'#1E7A34':'#185FA5';

  // date picker only for fix
  const datePicker=action==='fix'?buildDatePicker(s,flag):'';
  const dateSection=action==='fix'?`
    <div class="form-group">
      <label class="form-label">בחר תאריכים לתיקון <span class="req">*</span></label>
      <div class="select-all-row"><input type="checkbox" id="sel-all" onchange="toggleAllDates(this)"> בחר הכל</div>
      <div class="date-list">${datePicker}</div>
      <div class="form-err" id="fix-dates-err">נא לבחור לפחות תאריך אחד</div>
    </div>
    <div class="form-group">
      <label class="form-label">ערך חדש <span class="req">*</span></label>
      <select class="form-select" id="fix-val"><option value="">— בחר —</option><option value="1">1 (בסיס)</option><option value="בית">בית</option><option value="0">0 (סגור)</option></select>
      <div class="form-err" id="fix-val-err">נא לבחור ערך</div>
    </div>`:'' ;

  const ongoing=action==='approve'&&isStreakOngoing(s,flag);
  const todayISO=new Date().toISOString().split('T')[0];
  const untilSection=ongoing?
    '<div class="form-group" style="background:#FFF8E0;border-radius:8px;padding:10px;border:1px solid #FFE0A0;margin-bottom:10px">'+
    '<div style="font-size:12px;font-weight:700;color:#7A3F00;margin-bottom:6px">⚠ החריגה פעילה כרגע</div>'+
    '<label class="form-label">אשר עד תאריך <span style=\'color:#E8000A\'>*</span></label>'+
    '<input class="form-input" type="date" id="ap-until" min="'+todayISO+'">'+
    '<div class="form-err" id="ap-until-err">נא לבחור תאריך אישור</div>'+
    '</div>':'';

  const approversOpts=APPROVERS.map(a=>'<option>'+a+'</option>').join('');
  const submitLabel=action==='approve'?'✔ אשר':'✏ תקן';
  const submitClass=action==='approve'?'submit-green':'submit-blue';

  openModal(
    '<div class="modal-header"><span class="modal-title" style="color:'+actionColor+'">'+actionLabel+'<br><span style="font-size:12px;color:#2B76B5">'+s.name+' · '+m.label+'</span></span><button class="modal-close" onclick="closeModal()">✕</button></div>'+
    '<button class="back-btn" onclick="showActionPicker('+i+',\''+flag+'\')">← חזור</button>'+
    dateSection+
    untilSection+
    '<div class="form-group"><label class="form-label">גורם מאשר <span style=\'color:#E8000A\'>*</span></label>'+
    '<select class="form-select" id="ap-who"><option value="">— בחר —</option>'+approversOpts+'</select>'+
    '<div class="form-err" id="ap-err">נא לבחור גורם מאשר</div></div>'+
    '<div class="form-group"><label class="form-label">סיבה <span style="color:#888;font-weight:400">(אופציונלי)</span></label>'+
    '<input class="form-input" id="ap-reason" type="text" placeholder="פרט אם רלוונטי..." maxlength="150"></div>'+
    '<button class="submit-btn '+submitClass+'" onclick="submitHandle('+i+',\''+flag+'\',\''+action+'\','+ongoing+')">'+submitLabel+'</button>'
  );
}

function buildDatePicker(s,flag){
  let dates=[];
  if(flag==='teal'||flag==='red') dates=s.homeStreak.dates;
  else if(flag==='orange') dates=s.headers.filter((_,i)=>classify(s.cells[i])==='home');
  return dates.map((d,i)=>`<label class="date-item"><input type="checkbox" class="fix-date-cb" value="${i}" data-date="${d}"> ${d||'—'}</label>`).join('');
}

function toggleAllDates(cb){ document.querySelectorAll('.fix-date-cb').forEach(c=>c.checked=cb.checked); }

function submitHandle(i,flag,action,ongoing=false){
  // validate
  let ok=true;
  if(action==='fix'){
    const cbs=[...document.querySelectorAll('.fix-date-cb:checked')];
    const val=document.getElementById('fix-val').value;
    if(!cbs.length){document.getElementById('fix-dates-err').classList.add('show');ok=false;}else document.getElementById('fix-dates-err').classList.remove('show');
    if(!val){document.getElementById('fix-val').classList.add('error');document.getElementById('fix-val-err').classList.add('show');ok=false;}else{document.getElementById('fix-val').classList.remove('error');document.getElementById('fix-val-err').classList.remove('show');}
  }
  // validate approvalUntil if ongoing approve
  let approvalUntil=null;
  if(ongoing && action==='approve'){
    const untilEl=document.getElementById('ap-until');
    if(untilEl){ approvalUntil=untilEl.value; if(!approvalUntil){document.getElementById('ap-until-err').classList.add('show');ok=false;}else document.getElementById('ap-until-err').classList.remove('show'); }
  }
  const who=document.getElementById('ap-who').value;
  if(!who){document.getElementById('ap-who').classList.add('error');document.getElementById('ap-err').classList.add('show');ok=false;}else{document.getElementById('ap-who').classList.remove('error');document.getElementById('ap-err').classList.remove('show');}
  if(!ok)return;

  const s=window.soldiers[i]; const unit=getUnitForSoldier(i);
  const reason=document.getElementById('ap-reason').value.trim();
  const now=new Date(); const date=now.toLocaleDateString('he-IL')+' '+now.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  const streakKey=getStreakKey(s,flag);
  const fixedDates=action==='fix'?[...document.querySelectorAll('.fix-date-cb:checked')].map(c=>c.dataset.date):[];
  const fixedValue=action==='fix'?document.getElementById('fix-val').value:'';
  // save anomaly dates (teal/red = streak dates, orange = empty)
  const anomalyDates=(flag==='teal'||flag==='red')?s.homeStreak.dates.filter(Boolean):[];

  addHandled({unit,name:s.name,flag,streakKey,action,approver:who,reason,date,fixedDates,fixedValue,flagLabel:FLAG_META[flag].label,anomalyDates,approvalUntil});
  closeModal();
  rerenderCurrentView();
}

// ===== RENDER =====
function getChipClass(s,unit){
  const pending=getActivePendingFlags(s,unit);
  if(!pending.length) return null; // no active pending = normal (possibly with star)
  const p=pending;
  if(p.includes('teal')&&p.includes('red')&&p.includes('orange'))return'name-all-three';
  if(p.includes('teal')&&p.includes('red'))return'name-teal-red';
  if(p.includes('teal')&&p.includes('orange'))return'name-teal-orange';
  if(p.includes('teal'))return'name-teal';
  if(p.includes('red')&&p.includes('orange'))return'name-both';
  if(p.includes('red'))return'name-red';
  if(p.includes('orange'))return'name-orange';
  return null;
}

function renderNameCell(s,i,unit){
  const chipClass=getChipClass(s,unit);
  const hasStar=hasAnyHandled(s.name);
  const hasActive=!!chipClass;
  const clickInfo=(s.isTeal||s.isRed)&&hasActive?` onclick="showStreakModal(${i})" title="לחץ לפירוט"`:'';
  const starSpan=hasStar?` <span class="star-indicator">★</span>`:'';
  const nameHtml=`<span class="name-chip ${chipClass||'name-normal'}"${clickInfo}>${s.name}${starSpan}</span>`;
  const handleBtn=hasActive?`<button class="handle-btn" onclick="showHandlePicker(${i})">⚙ טפל</button>`:'';
  return `<td class="col-name"><div class="name-cell-inner">${nameHtml}${handleBtn}</div></td>`;
}

function renderTable(soldiers,unit,showUnit=false){
  if(!soldiers.length)return'<div class="loading-box">אין נתונים</div>';
  let h='<div class="table-wrap"><table><thead><tr>';
  h+=`<th class="col-name">שם</th>`;
  if(showUnit)h+=`<th class="col-unit">מחלקה</th>`;
  h+=`<th class="col-stat" style="color:#1E5208">בסיס</th><th class="col-stat" style="color:#7A3F00">בית</th><th class="col-stat" style="color:#3A3A36">סגור</th><th class="col-stat" style="color:#0A3D7A">אחר</th><th class="col-stat" style="color:#5A3E8A">שמ"פ</th><th class="col-stat" style="color:#1E5208">זכאות התארגנות</th>`;
  h+='</tr></thead><tbody>';
  soldiers.forEach((s,i)=>{
    const u=showUnit?(s._unit||unit):unit;
    const otherClick=s.other>0?` onclick="showOtherModal(${i})" title="לחץ לפירוט"`:'';
    h+=`<tr>${renderNameCell(s,i,u)}
      ${showUnit?`<td class="col-unit" style="font-size:11px;color:#555">${s._unit||''}</td>`:''}
      <td class="col-stat"><span class="badge b-green">${s.base}</span></td>
      <td class="col-stat"><span class="badge b-yellow">${s.home}</span></td>
      <td class="col-stat"><span class="badge b-gray">${s.closed}</span></td>
      <td class="col-stat"><span class="badge b-blue"${otherClick}>${s.other}</span></td>
      <td class="col-stat"><span class="badge" style="background:#EDE0FF;color:#5A3E8A">${s.shimpa}</span></td>
      <td class="col-stat"><span class="badge" style="background:#D4EDBA;color:#1E5208">${s.hitargenut}</span></td></tr>`;
  });
  h+='</tbody></table></div>';
  return h;
}

function renderLogView(){
  const entries=storage.handled.slice().reverse(); // newest first
  if(!entries.length)return'<div class="log-wrap"><div class="log-empty">📋 אין אירועים מטופלים עדיין</div></div>';
  let h='<div class="log-wrap"><table class="log-table"><thead><tr><th>שם</th><th>מחלקה</th><th>חריגה</th><th>תאריכי החריגה</th><th>גורם מאשר</th><th>פתרון</th><th>סיבה</th><th>תאריך טיפול</th></tr></thead><tbody>';
  entries.forEach(e=>{
    const m=FLAG_META[e.flag]||{label:e.flag,color:'#888'};
    const actionLabel=e.action==='fix'?'תיקון':'אישור';
    const fixDetail=e.action==='fix'&&e.fixedDates?.length?'<br><span style="font-size:10px;color:#555">תוקן ל: '+e.fixedValue+' | '+e.fixedDates.join(', ')+'</span>':'';
    const anomalyDatesCell=e.flag==='orange'?'—':(e.anomalyDates||[]).join(', ')||'—';
    h+=`<tr>
      <td style="font-weight:700">${e.name}</td>
      <td>${e.unit||''}</td>
      <td><span class="log-flag-badge" style="background:${m.color}">${m.label}</span></td>
      <td style="font-size:11px;color:#555">${anomalyDatesCell}</td>
      <td>${e.approver}</td>
      <td>${actionLabel}${fixDetail}</td>
      <td style="color:#555">${e.reason||'—'}</td>
      <td style="font-size:11px;color:#2B76B5;white-space:nowrap">${e.date}</td>
    </tr>`;
  });
  h+='</tbody></table></div>';
  return h;
}

function updateSummary(soldiers){
  document.getElementById('summary').style.display='grid';
  document.getElementById('s-soldiers').textContent=soldiers.length;
  document.getElementById('s-base').textContent=soldiers.reduce((a,s)=>a+s.base,0);
  document.getElementById('s-home').textContent=soldiers.reduce((a,s)=>a+s.home,0);
  // count soldiers with active pending flags
  document.getElementById('s-red').textContent=soldiers.filter(s=>{ const u=s._unit||sheets[activeIdx]?.name||''; return getActivePendingFlags(s,u).length>0; }).length;
}

function renderTabs(){
  const el=document.getElementById('tabs');
  let html=sheets.map((s,i)=>`<div class="tab ${currentView==='sheet'&&i===activeIdx?'active':''}" onclick="switchTab(${i})">${s.name}</div>`).join('');
  const totalAnomaly=sheets.reduce((a,sh)=>a+sh.soldiers.filter(s=>getActivePendingFlags(s,sh.name).length>0).length,0);
  html+=`<div class="tab tab-anomaly ${currentView==='anomaly'?'active':''}" onclick="switchAnomalyTab()">⚠ חריגים (${totalAnomaly})</div>`;
  html+=`<div class="tab tab-log ${currentView==='log'?'active':''}" onclick="switchLogTab()">📋 יומן (${storage.handled.length})</div>`;
  el.innerHTML=html;
}

function switchTab(i){ activeIdx=i; currentView='sheet'; renderTabs(); window.soldiers=sheets[i].soldiers; document.getElementById('content').innerHTML=renderTable(window.soldiers,sheets[i].name); updateSummary(window.soldiers); document.getElementById('summary').style.display='grid'; }
function switchAnomalyTab(){
  currentView='anomaly'; renderTabs();
  const all=[];
  sheets.forEach(sh=>sh.soldiers.forEach(s=>{ if(s.isTeal||s.isRed||s.isOrange)all.push({...s,_unit:sh.name}); }));
  window.soldiers=all;
  document.getElementById('content').innerHTML=renderTable(all,'',true);
  updateSummary(all);
  document.getElementById('summary').style.display='grid';
}
function switchLogTab(){
  currentView='log'; renderTabs();
  window.soldiers=[];
  document.getElementById('content').innerHTML=renderLogView();
  document.getElementById('summary').style.display='none';
}
function rerenderCurrentView(){
  renderTabs();
  if(currentView==='sheet')switchTab(activeIdx);
  else if(currentView==='anomaly')switchAnomalyTab();
  else switchLogTab();
}

// ===== EXCEL =====
function exportExcel(){
  const wb=XLSX.utils.book_new();
  const rows=[['שם','מחלקה','חריגה','תאריכי החריגה','גורם מאשר','פתרון','סיבה','תאריך טיפול','תאריכים שתוקנו','ערך חדש']];
  const styles={};
  storage.handled.forEach((e,ri)=>{
    const anomalyDates=e.flag==='orange'?'':(e.anomalyDates||[]).join(', ');
    rows.push([e.name,e.unit||'',e.flagLabel||e.flag,anomalyDates,e.approver,e.action==='fix'?'תיקון':'אישור',e.reason||'',e.date,(e.fixedDates||[]).join(', '),e.fixedValue||'']);
    styles[ri+1]={fgColor:{rgb:e.action==='fix'?'BDD7EE':'C6EFCE'}};
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const range=XLSX.utils.decode_range(ws['!ref']||'A1');
  Object.entries(styles).forEach(([ri,fill])=>{ for(let c=range.s.c;c<=range.e.c;c++){ const addr=XLSX.utils.encode_cell({r:parseInt(ri),c}); if(!ws[addr])ws[addr]={t:'s',v:''}; ws[addr].s={fill}; } });
  ws['!cols']=[18,12,22,35,12,10,20,18,30,10].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws,'יומן אירועים');
  XLSX.writeFile(wb,`יומן_אירועים_${new Date().toLocaleDateString('he-IL').replace(/\//g,'-')}.xlsx`);
}

// ===== LOAD =====
async function loadAll(){
  setStatus('loading');
  try{
    const r1=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SOURCE_ID}?key=${API_KEY}&fields=sheets.properties.title`);
    if(!r1.ok)throw new Error('שגיאת API '+r1.status);
    const names=(await r1.json()).sheets.map(s=>s.properties.title);
    const loaded=[];
    for(const name of names){
      const r2=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SOURCE_ID}/values/${encodeURIComponent(name)}?key=${API_KEY}`);
      if(!r2.ok)continue;
      const{soldiers,headers}=processRows((await r2.json()).values||[]);
      loaded.push({name,soldiers,headers});
    }
    sheets=loaded;
    if(activeIdx>=sheets.length)activeIdx=0;
    renderTabs();
    if(currentView==='sheet'&&sheets.length)switchTab(activeIdx);
    else if(currentView==='anomaly')switchAnomalyTab();
    else if(currentView==='log')switchLogTab();
    document.getElementById('meta').textContent='עודכן: '+new Date().toLocaleTimeString('he-IL');
    setStatus('ok');
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="err-box">❌ ${e.message}</div>`;
    setStatus('err');
  }
}
function setStatus(s){
  const dot=document.getElementById('sdot'),txt=document.getElementById('stext');
  if(s==='ok'){dot.style.background='#1E5208';txt.textContent='מחובר — מתעדכן כל 30 שניות';}
  else if(s==='err'){dot.style.background='#C00';txt.textContent='שגיאה בטעינה';}
  else{dot.style.background='#FF7200';txt.textContent='מרענן...';}
}

loadStorage();
loadAll();
setInterval(loadAll,30000);
